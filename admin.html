<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sultan-ul-Arifeen</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-color-light) 0%, #E8E8E4 100%);
        }

        .login-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .error-msg {
            color: #d9534f;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="login-box">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style="margin-bottom: 1rem;">
            <path
                d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                stroke="#154c33" stroke-width="2" />
            <path d="M12 22C12 22 12 14 17 12C22 10 22 12 22 12" stroke="#154c33" stroke-width="2" />
            <path d="M2 12C2 12 10 12 12 7C14 2 12 2 12 2" stroke="#154c33" stroke-width="2" />
        </svg>
        <h2>Admin Portal</h2>

        <p class="error-msg" id="errorMsg">Invalid password.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Hint: admin123">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Login</button>
        </form>
        <a href="adnan.html"
            style="display: block; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">&larr; Back to
            Shop</a>
    </div>

    <script>
        // Custom Cursor Logic
        const cursorDot = document.querySelector(".cursor-dot");
        const cursorOutline = document.querySelector(".cursor-outline");

        window.addEventListener("mousemove", (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;

            setTimeout(() => {
                cursorOutline.style.left = `${posX}px`;
                cursorOutline.style.top = `${posY}px`;
            }, 50);
        });

        // Check if already logged in
        if (localStorage.getItem('adminAuth') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;

            // Hardcoded password for demo purposes
            if (pass === 'admin123') {
                localStorage.setItem('adminAuth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
